name: Build
description: Builds image and pushes to the repository
inputs:
  image:
    description: Image name (full repo path)
    required: true

  branch-based-tag:
    description: Branch based tag (dev=latest, main=stable)
    required: true

  commit-tag:
    description: Tag with commit hash
    required: true

  image-tag:
    description: Combined tag (image-date-tag + branch-based-tag), e.g. 2026.02.13-stable
    required: true

  image-date-tag:
    description: Date tag (YYYY.MM.DD), e.g. 2026.03.11
    required: true

  context:
    description: Docker context path
    required: true
  dockerfile:
    description: Dockerfile path
    required: true
  build-args:
    description: Docker container Build arguments
    required: false
  registry-password:
    description: GitHub Container Registry token
    required: true

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.registry-password }}

    - name: Build image and push to GitHub Container Registry
      uses: docker/build-push-action@v5
      with:
        push: true
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        build-args: ${{ inputs.build-args }}
        tags: |
          ${{ inputs.image }}:${{ inputs.branch-based-tag }}
          ${{ inputs.image }}:${{ inputs.commit-tag }}
          ${{ inputs.image }}:${{ inputs.image-tag }}
          ${{ inputs.image }}:${{ inputs.image-date-tag }}
        cache-from: type=registry,ref=${{ inputs.image }}:buildcache-${{ inputs.branch-based-tag }}
        cache-to: type=registry,ref=${{ inputs.image }}:buildcache-${{ inputs.branch-based-tag }},mode=max
